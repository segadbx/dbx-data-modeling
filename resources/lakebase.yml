resources:
  database_instances:
    modeler_pg:
      name: ${var.lakebase_instance_name}
      capacity: ${var.lakebase_capacity}

  database_catalogs:
    modeler_catalog:
      name: ${var.lakebase_database_catalog_name}
      database_instance_name: ${resources.database_instances.modeler_pg.name}
      database_name: ${var.lakebase_database_name}
      create_database_if_not_exists: true

