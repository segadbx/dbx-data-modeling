resources:
  jobs:
    apply_ddl:
      name: "[${bundle.target}] apply gold DDL"
      description: "Executes the approved proposal's CREATE+MERGE SQL against the warehouse."
      parameters:
        - name: proposal_id
          default: ""
        - name: warehouse_id
          default: ${var.warehouse_id}
        - name: lakebase_instance
          default: ${var.lakebase_instance_name}
        - name: lakebase_database
          default: ${var.lakebase_database_name}
      tasks:
        - task_key: apply
          environment_key: serverless_env
          spark_python_task:
            python_file: ../../src/apply/apply_ddl.py
            parameters:
              - "--proposal-id"
              - "{{job.parameters.proposal_id}}"
              - "--warehouse-id"
              - "{{job.parameters.warehouse_id}}"
              - "--lakebase-instance"
              - "{{job.parameters.lakebase_instance}}"
              - "--lakebase-database"
              - "{{job.parameters.lakebase_database}}"
      environments:
        - environment_key: serverless_env
          spec:
            client: "1"
            dependencies:
              - databricks-sql-connector>=3.5.0
              - databricks-sdk>=0.39.0
              - "psycopg[binary]>=3.2.0"
