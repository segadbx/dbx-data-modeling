resources:
  jobs:
    seed_lakebase:
      name: "[${bundle.target}] alembic migrate Lakebase"
      description: "Runs Alembic head against the Lakebase modeler database."
      parameters:
        - name: lakebase_instance
          default: ${var.lakebase_instance_name}
        - name: lakebase_database
          default: ${var.lakebase_database_name}
        - name: app_name
          default: ${var.app_name}
      tasks:
        - task_key: migrate
          environment_key: serverless_env
          spark_python_task:
            python_file: ../../src/apply/seed_lakebase.py
            parameters:
              - "--instance"
              - "{{job.parameters.lakebase_instance}}"
              - "--database"
              - "{{job.parameters.lakebase_database}}"
              - "--app-name"
              - "{{job.parameters.app_name}}"
              - "--migrations-dir"
              - "../../migrations"
      environments:
        - environment_key: serverless_env
          spec:
            client: "1"
            dependencies:
              - alembic>=1.13.0
              - sqlalchemy>=2.0.0
              - "psycopg[binary]>=3.2.0"
              - databricks-sdk>=0.39.0
